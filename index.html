        // IMAGE COMPRESSION UTILITY
        const compressImage = (file, maxWidth = 1600, quality = 0.8) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height = (maxWidth * height) / width;
                            width = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => {
                            resolve({
                                blob,
                                dataUrl: canvas.toDataURL('image/jpeg', quality)
                            });
                        }, 'image/jpeg', quality);
                    };
                };
            });
        };

        const formatAIText = (text, variant = 'solution') => {
            if (!text) return null;
            // Yapay zekadan kaçış karakteri olarak (literal \n) gelen ifadeleri temizle
            const normalizedText = text.replace(/\\n/g, '\n');
            const paragraphs = normalizedText.split('\n');
            
            const isTip = variant === 'tip';
            const textColorClass = isTip ? 'text-amber-800 dark:text-amber-300' : 'text-slate-700 dark:text-slate-300';
            const boldColorClass = isTip ? 'text-amber-900 dark:text-amber-200' : 'text-emerald-700 dark:text-emerald-400';
            const bulletColorClass = isTip ? 'text-amber-500' : 'text-emerald-500';

            return paragraphs.map((paragraph, i) => {
                if (paragraph.trim() === '') {
                    return <div key={i} className="h-3"></div>;
                }

                const isListItem = paragraph.trim().startsWith('* ') || paragraph.trim().startsWith('- ');
                const content = isListItem ? paragraph.replace(/^\s*[*|-]\s*/, '') : paragraph;

                // Kalın yazıları (bold) vurgula
                const parts = content.split(/(\*\*.*?\*\*)/g);
                const formattedContent = parts.map((part, j) => {
                    if (part.startsWith('**') && part.endsWith('**')) {
                        return <strong key={j} className={`${boldColorClass} font-black`}>{part.slice(2, -2)}</strong>;
                    }
                    return part;
                });

                if (isListItem) {
                    return (
                        <div key={i} className={`flex gap-2 mb-2 ml-4 ${textColorClass}`}>
                            <span className={`${bulletColorClass} font-black mt-0.5`}>•</span>
                            <span className={`leading-relaxed ${isTip ? 'font-bold italic' : 'font-medium'}`}>{formattedContent}</span>
                        </div>
                    );
                }

                return (
                    <p key={i} className={`mb-3 leading-relaxed ${isTip ? 'font-bold italic' : 'font-medium'} ${textColorClass}`}>
                        {formattedContent}
                    </p>
                );
            });
        };

        const App = () => {
            const [user, setUser] = useState(null);

            const [viewingQuestion, setViewingQuestion] = useState(null);

            const fileInputRef = useRef(null);
            const updateFileInputRef = useRef(null);

                setSelectedSubjectId('turkce');
                setDashboardFilterId(null);

            useEffect(() => {

                            docs.sort((a, b) => {
                                const timeA = a.createdAt?.seconds || Date.now() / 1000;
                                const timeB = b.createdAt?.seconds || Date.now() / 1000;
                                return timeB - timeA;
                            });
                            setCloudQs(docs);

                        err => console.error("Snapshot hatası (Büyük ihtimalle Index eksiği veya Kurallar):", err)

            useEffect(() => {

                        restore: false,
                        guides: true,
                        center: true,
                        highlight: false,
                        cropBoxMovable: true,

                return () => {

            const activeCurriculum = CURRICULUM[grade];
            const allQs = useMemo(() => user ? [...localQs, ...cloudQs] : localQs, [user, localQs, cloudQs]);

            const filteredQuestions = useMemo(() => {
                const filtered = allQs.filter(q => {
                    const gMatch = q.grade === grade || !q.grade;
                    const sMatch = !dashboardFilterId || q.subjectId === dashboardFilterId;
                    const uMatch = !selectedUnitTag || q.unitName === selectedUnitTag;
                    return gMatch && sMatch && uMatch;

                return filtered.sort((a, b) => {
                    const wA = a.isUnderstood ? 3 : (a.isImportant ? 2 : 1);
                    const wB = b.isUnderstood ? 3 : (b.isImportant ? 2 : 1);
                    if (wA !== wB) return wA - wB;
                    
                    const tA = a.createdAt?.seconds || 0;

                        fillColor: '#fff',

                    if (updatingQuestion) {
                        if (viewingQuestion && viewingQuestion.id === updatingQuestion.id) {
                            setViewingQuestion(prev => ({ ...prev, imageUrl: newImageUrl }));
                        }
                        setUpdatingQuestion(null);
                        setCropImageSrc(null);
                        
                        try {
                            if (updatingQuestion.isCloud) {
                                await db.collection('questions').doc(updatingQuestion.id).update({ imageUrl: newImageUrl });
                            } else {
                                const upd = localQs.map(q => q.id === updatingQuestion.id ? { ...q, imageUrl: newImageUrl } : q);
                                localStorage.setItem('hata_v6', JSON.stringify(upd));
                                setLocalQs(upd);
                            }
                        } catch (err) {
                            alert("Fotoğraf güncellenirken hata oluştu: " + err.message);
                        }
                    } else {
                        setPreview(newImageUrl);
                        setCropImageSrc(null);
                    }
                }
            };

            const handleSave = async (e) => {
                e.preventDefault();
                if (!preview) return alert("Lütfen bir fotoğraf çekin veya seçin!");
                setLoading(true);
                setStatusText("Kaydediliyor...");
                
                try {
                    const data = { 
                        grade, 
                        subjectId: e.target.subjectId.value, 
                        unitName: e.target.unitName.value, 
                        correctAnswer: e.target.correctAnswer?.value || null,
                        note: e.target.note.value, 
                        createdAt: { seconds: Math.floor(Date.now()/1000) } 
                    };

                    if (user) {
                        try {
                            setStatusText("Kayıt Oluşturuluyor...");
                            
                            // Doğrudan Base64 olarak Firestore'a kaydediyoruz. Storage limitine takılmıyoruz.
                            const dbTask = db.collection('questions').add({ 
                                ...data, 
                                userId: user.uid, 
                                imageUrl: preview, 
                                createdAt: firebase.firestore.FieldValue.serverTimestamp() 
                            });
                            const timeoutDb = new Promise((_, reject) => setTimeout(() => reject(new Error("Veritabanı bağlantısı zaman aşımına uğradı.")), 10000));
                            await Promise.race([dbTask, timeoutDb]);
                            
                            setIsModalOpen(false); setPreview(null);
                        } catch(err) { 
                            console.error(err);
                            alert("Buluta kaydederken hata oluştu: " + err.message + "\n\nCihaz hafızasına kaydedilmesi deneniyor..."); 
                            saveLocal(data, preview); 
                        }
                    } else { 
                        saveLocal(data, preview); 
                    }
                } catch (error) {
                    console.error("Genel Hata:", error);
                    alert("Beklenmeyen bir hata oluştu: " + error.message);
                } finally {
                    setLoading(false);
                    setStatusText("");
                }
            };

            const saveLocal = (data, dataUrl) => {
                try {
                    const upd = [{ ...data, id: 'L'+Date.now(), imageUrl: dataUrl, isCloud: false }, ...localQs];
                    localStorage.setItem('hata_v6', JSON.stringify(upd));
                    setLocalQs(upd);
                    setIsModalOpen(false); setPreview(null);
                } catch(e) {
                    if (e.name === 'QuotaExceededError' || e.message.includes('quota')) {
                        alert("Cihazınızın yerel hafızası doldu! Uygulama içindeki fotoğraflar çok fazla yer kaplıyor. Lütfen giriş yaparak fotoğrafları buluta yedekleyin veya eski soruları silin.");
                    } else {
                        alert("Yerel hafızaya kaydederken hata: " + e.message);
                    }
                    throw e; // Hata handleSave'e iletilsin ki yükleme ekranı kapansın
                }
            };

            const toggleStatus = async (q, type) => {
                let newImportant = q.isImportant || false;
                let newUnderstood = q.isUnderstood || false;

                if (type === 'important') {
                    newImportant = !q.isImportant;
                    if (newImportant) newUnderstood = false;
                } else if (type === 'understood') {
                    newUnderstood = !q.isUnderstood;
                    if (newUnderstood) newImportant = false;
                }

                if (q.isCloud) {
                    try {
                        await db.collection('questions').doc(q.id).update({ isImportant: newImportant, isUnderstood: newUnderstood });
                    } catch (err) {
                        alert("Güncellenirken hata oluştu: " + err.message);
                    }
                } else {
                    const upd = localQs.map(item => item.id === q.id ? { ...item, isImportant: newImportant, isUnderstood: newUnderstood } : item);
                    localStorage.setItem('hata_v6', JSON.stringify(upd));
                    setLocalQs(upd);
                }
            };

            const toggleSpeech = (text) => {
                if ('speechSynthesis' in window) {
                    if (window.speechSynthesis.speaking) {
                        window.speechSynthesis.cancel();
                        setIsSpeaking(false);
                        return;
                    }

                    // Temizleme: markdown tırnaklar ve yeni satırları kaldır
                    let cleanText = text.replace(/\\n/g, ' ');
                    cleanText = cleanText.replace(/\*\*/g, '');
                    cleanText = cleanText.replace(/\*/g, '');

                    const utterance = new SpeechSynthesisUtterance(cleanText);
                    utterance.lang = 'tr-TR';
                    
                    // Türkçe ses bulmaya çalış
                    const voices = window.speechSynthesis.getVoices();
                    const trVoice = voices.find(v => v.lang.includes('tr') || v.lang.includes('TR'));
                    if (trVoice) utterance.voice = trVoice;

                    utterance.onend = () => setIsSpeaking(false);
                    utterance.onerror = () => setIsSpeaking(false);

                    setIsSpeaking(true);
                    window.speechSynthesis.speak(utterance);
                } else {
                    alert("Tarayıcınız sesli okuma özelliğini desteklemiyor.");
                }
            };

            const jumpToTopic = (sId, uName) => {
                setDashboardFilterId(sId);
                setSelectedUnitTag(uName);
                setActiveTab('dashboard');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const triggerAI = async () => {
                if (!viewingQuestion || !viewingQuestion.imageUrl || !geminiApiKey) return;
                setIsAILoading(true);
                
                try {
                    const prompt = `Sen 'Becerikli' adında LGS'ye hazırlanan 7. ve 8. sınıf öğrencilerine yardımcı olan cana yakın, motive edici ve akıllı bir yapay zeka ders koçusun. Sana gönderilen bu soru fotoğrafını çok detaylı bir şekilde analiz et.

ÖNEMLİ KURALLAR:
1. Çözüm yöntemin ve anlatım dilin KESİNLİKLE 7. ve 8. sınıf (ortaokul) öğrencilerinin bilgi seviyesine ve müfredatına uygun olmalıdır. 
2. Öğrenciyi asla formüllere boğma! Çözümde her zaman sözel anlatıma, olayın pratik mantığına ağırlık ver. Karmaşık lise düzeyindeki formüllerden veya üniversite terimlerinden kesinlikle uzak dur. Çözümü adım adım, son derece basit, ezberden uzak ve mantığını kavratacak şekilde anlat.
3. Çözüm adımlarını 'solution' kısmına, öğrenciye bu soru tipiyle ilgili akılda kalıcı pratik bir ders tüyosunu 'tip' kısmına yaz.
4. Sorunun doğru seçeneğini (A, B, C veya D) 'correctOption' olarak belirt.
5. JSON formatının bozulmaması için metin değerleri (string) içerisinde ASLA gerçek satır atlama (enter/newline) kullanma. Satır atlamak istersen mutlaka '\\n' (ters slash n) karakterini kullan.
6. JSON metin değerleri içerisinde çift tırnak (") yerine sadece tek tırnak (') kullan.

Lütfen yanıtını mutlaka belirtilen JSON şemasında döndür. Markdown etiketleri (örn. \`\`\`json) KULLANMA, doğrudan saf JSON döndür. 
Şema: {"solution": "öğrenci seviyesine uygun, mantığı kavratan sözel çözüm metni", "tip": "akılda kalıcı pratik tüyo", "correctOption": "doğru şıkkı (örneğin: A)"}`;

                    const keys = geminiApiKey.split(',').map(k => k.trim()).filter(k => k.length > 0);
                    if (keys.length === 0) throw new Error("Lütfen ayarlardan en az bir geçerli Gemini API anahtarı girin.");

                    const base64Parts = viewingQuestion.imageUrl.split(',');
                    const mimeType = base64Parts[0].match(/:(.*?);/)[1];
                    const rawBase64 = base64Parts[1];

                    let parsed = null;
                    let lastErrorMsg = "";

                    for (let i = 0; i < keys.length; i++) {
                        const targetIndex = (currentKeyIndex + i) % keys.length;
                        const activeKey = keys[targetIndex];
                        
                        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${activeKey}`;
                        
                        let response;
                        let retries = 0;
                        const maxRetries = 1;

                        try {
                            while (true) {
                                response = await fetch(url, {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({
                                        contents: [{
                                            parts: [
                                                { text: prompt },
                                                { inlineData: { mimeType: mimeType, data: rawBase64 } }
                                            ]
                                        }],
                                        generationConfig: { responseMimeType: "application/json" }
                                    })
                                });

                                if (response.status === 503 && retries < maxRetries) {
                                    retries++;
                                    await new Promise(r => setTimeout(r, 2000 * retries));
                                    continue;
                                }
                                break;
                            }

                            if (!response.ok) {
                                if (response.status === 429) {
                                    if (keys.length > 1 && i < keys.length - 1) {
                                        console.warn(`Key index ${targetIndex} hit quota. Rotating...`);
                                        continue;
                                    }
                                    throw new Error("Yapay zeka istek limitine (kota) ulaştınız! Lütfen yaklaşık 30 saniye sonra tekrar deneyin.");
                                }
                                const errBody = await response.text();
                                let errMsg = "API Hatası oluştu.";
                                try { errMsg = JSON.parse(errBody).error.message; } catch(e) {}
                                throw new Error(errMsg);
                            }

                            const data = await response.json();
                            const resultText = data.candidates[0].content.parts[0].text;
                            
                            let cleanJson = resultText.trim();
                            if (cleanJson.startsWith("```")) {
                                cleanJson = cleanJson.replace(/^```(json)?\n?/, "").replace(/\n?```$/, "");
                            }
                            
                            cleanJson = cleanJson.replace(/[\r\n]+/g, ' ');
                            
                            parsed = JSON.parse(cleanJson);
                            setCurrentKeyIndex(targetIndex); // Çalışan indexi kaydet ki bir sonrakinde direkt oradan başlasın
                            break;

                        } catch (err) {
                            lastErrorMsg = err.message;
                            if (i === keys.length - 1) {
                                throw new Error(lastErrorMsg);
                            }
                            console.warn(`API Key index ${targetIndex} failed: ${err.message}. Trying next...`);
                        }
                    }

                    if (viewingQuestion.isCloud) {
                        await db.collection('questions').doc(viewingQuestion.id).update({
                            aiSolution: parsed.solution,
                            aiTip: parsed.tip,
                            correctAnswer: parsed.correctOption || viewingQuestion.correctAnswer || null
                        });
                    } else {
                        const upd = localQs.map(q => q.id === viewingQuestion.id ? { ...q, aiSolution: parsed.solution, aiTip: parsed.tip, correctAnswer: parsed.correctOption || q.correctAnswer || null } : q);
                        localStorage.setItem('hata_v6', JSON.stringify(upd));
                        setLocalQs(upd);
                    }
                    
                    setViewingQuestion(prev => ({
                        ...prev, 
                        aiSolution: parsed.solution, 
                        aiTip: parsed.tip, 
                        correctAnswer: parsed.correctOption || prev.correctAnswer || null
                    }));
                    setShowAISolution(true);

                } catch (err) {
                    alert("Yapay Zeka Hatası: " + err.message);
                } finally {
                    setIsAILoading(false);
                }
            };

            return (
                <div className="min-h-screen flex flex-col pt-20">

                                        className={`grade-chip ${grade === g ? 'bg-primary-600 border-primary-600 text-white shadow-lg' : 'bg-slate-50 border-slate-100 text-slate-400'}`}>
                                        {g}. Sınıf
                                    </div>
                                ))}
                            </div>
                            <nav className="flex-grow flex justify-center" onClick={() => {
                                setAdminClicks(prev => {
                                    if (prev + 1 >= 5) {
                                        setShowAdminPanel(true);
                                        return 0;
                                    }
                                    return prev + 1;
                                });
                            }}>
                                <div className="flex bg-slate-100 p-1 rounded-2xl border border-slate-100">
                                    <div onClick={(e) => { e.stopPropagation(); setActiveTab('dashboard'); }} className={`nav-link ${activeTab === 'dashboard' ? 'bg-white shadow-md text-primary-700' : 'text-slate-400 hover:text-slate-600'}`}>DEFTER</div>
                                    <div onClick={(e) => { e.stopPropagation(); setActiveTab('stats'); }} className={`nav-link ${activeTab === 'stats' ? 'bg-white shadow-md text-primary-700' : 'text-slate-400 hover:text-slate-600'}`}>ANALİZ</div>
                                </div>
                            </nav>
                            <div className="w-[180px] flex justify-end items-center gap-3">
                                <button onClick={() => setTheme(t => t === 'dark' ? 'light' : 'dark')} className="p-2 text-slate-400 hover:text-primary-600 transition-colors bg-slate-50 rounded-full">
                                    {theme === 'dark' ? <Icon name="Sun" className="w-4 h-4" /> : <Icon name="Moon" className="w-4 h-4" />}
                                </button>
                                {!user ? <button onClick={() => auth.signInWithPopup(googleProvider).catch(err => alert("Giriş yapılamadı: " + err.message))} className="text-[10px] font-black text-slate-400 uppercase tracking-widest hover:text-primary-600 transition-colors">GİRİŞ</button> : <button onClick={() => auth.signOut()} className="text-[10px] font-black text-red-500 uppercase tracking-widest hover:text-red-700 transition-colors">ÇIKIŞ</button>}
                                <button onClick={() => setIsModalOpen(true)} className="btn-primary py-2.5 px-6"><Icon name="Plus" className="w-4 h-4" /> <span className="hidden lg:inline uppercase">SORU EKLE</span></button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto w-full p-4 pt-10 flex-grow">
                        <div className="sm:hidden flex justify-center gap-2 mb-8">
                            {['7', '8'].map(g => (
                                <div key={g} onClick={() => setGrade(g)} className={`grade-chip ${grade === g ? 'bg-primary-600 border-primary-600 text-white' : 'bg-slate-50 border-slate-100 text-slate-400'}`}>{g}. Sınıf</div>
                            ))}
                        </div>

                        {activeTab === 'dashboard' ? (
                            <div className="animate-[fadeIn_0.3s_ease-out]">
                                <div className="grid grid-cols-2 xs:grid-cols-3 md:grid-cols-6 gap-2 mb-10">
                                    {activeCurriculum.map(s => (
                                        <div key={s.id} onClick={() => { setDashboardFilterId(dashboardFilterId === s.id ? null : s.id); setSelectedUnitTag(null); }} 
                                            className={`subject-card ${dashboardFilterId === s.id ? 'ring-4 ring-primary-500/20 bg-primary-50 dark:bg-primary-500/10 border-primary-100 dark:border-primary-500/30' : ''}`}>
                                            <div className={`${s.bg} ${s.color} p-4 rounded-full mb-1`}><Icon name={s.icon} className="w-6 h-6" /></div>
                                            <div className="text-center px-1">
                                                <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest leading-none truncate w-full">{s.name}</p>
                                                <p className="text-3xl font-black text-slate-800 mt-1.5 leading-none">{allQs.filter(q => (q.grade === grade || !q.grade) && q.subjectId === s.id).length}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 pb-20">
                                    {filteredQuestions.map(q => (
                                        <div key={q.id} onClick={() => { setViewingQuestion(q); setShowAnswer(false); setShowAISolution(false); }} className="glass-card overflow-hidden group hover:shadow-2xl cursor-pointer transition-all">
                                            <div className="relative aspect-video bg-slate-100 dark:bg-slate-800">
                                                <img src={q.imageUrl} className={`w-full h-full object-cover transition-all ${q.isUnderstood ? 'grayscale opacity-70' : ''}`} loading="lazy" />
                                                <div className="absolute top-3 left-3 flex flex-col gap-1.5 items-start">
                                                    <span className={`px-2.5 py-1 rounded-full text-[9px] font-black uppercase tracking-widest shadow-lg ${activeCurriculum.find(s=>s.id===q.subjectId)?.bg || 'bg-slate-50'} ${activeCurriculum.find(s=>s.id===q.subjectId)?.color || 'text-slate-500'}`}>{activeCurriculum.find(s=>s.id===q.subjectId)?.name || 'Ders'}</span>
                                                    {q.unitName && <span className="px-2.5 py-1 rounded-full text-[8px] font-black uppercase bg-white/90 dark:bg-black/80 text-slate-700 dark:text-slate-200 shadow-md">{q.unitName}</span>}
                                                </div>
                                                <div className="absolute top-3 right-3 flex flex-col gap-2 z-10">
                                                    <button onClick={(e) => { e.stopPropagation(); toggleStatus(q, 'important'); }} className={`p-2 rounded-full backdrop-blur-md shadow-lg transition-all border border-white/20 ${q.isImportant ? 'bg-yellow-400 text-white' : 'bg-white/80 dark:bg-black/50 text-slate-400 hover:text-yellow-500'}`}>
                                                        <Icon name="Star" className={`w-4 h-4 ${q.isImportant ? 'fill-current' : ''}`} />
                                                    </button>
                                                    <button onClick={(e) => { e.stopPropagation(); toggleStatus(q, 'understood'); }} className={`p-2 rounded-full backdrop-blur-md shadow-lg transition-all border border-white/20 ${q.isUnderstood ? 'bg-emerald-500 text-white' : 'bg-white/80 dark:bg-black/50 text-slate-400 hover:text-emerald-500'}`}>
                                                        <Icon name="Check" className="w-4 h-4 stroke-[3]" />
                                                    </button>
                                                </div>
                                            </div>
                                            <div className="p-6">
                                                {q.note ? (
                                                    <p className="text-slate-700 font-bold text-base mb-6 line-clamp-2 h-12 italic leading-relaxed">"{q.note}"</p>

                                                <div className="flex justify-between items-center text-[10px] font-black text-slate-400 tracking-widest uppercase">
                                                    <span>{new Date(q.createdAt?.seconds*1000).toLocaleDateString()}</span>

                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="animate-[fadeIn_0.3s_ease-out] pb-24 text-center">
                                <div className="mb-14">
                                    <h2 className="text-5xl font-black text-slate-900 tracking-tighter uppercase italic">{grade}. SINIF ANALİZİ</h2>
                                    <p className="text-slate-400 font-bold uppercase text-xs tracking-widest mt-2">Gelişimini verilerle takip et.</p>
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 text-left">
                                    <div className="lg:col-span-1">
                                        <div className="glass-card p-12 bg-primary-600 text-white text-center shadow-2xl">
                                            <h3 className="text-[10px] font-black uppercase tracking-[0.5em] mb-4 opacity-70 italic font-bold">Toplam Hata</h3>
                                            <p className="text-9xl font-black tracking-tighter leading-none">{stats.total}</p>
                                        </div>

                                    <div className="lg:col-span-2 glass-card p-10 bg-white">
                                        <div className="space-y-6">
                                            {stats.subjectStats.map(s => (
                                                <div key={s.id} className="border-b border-slate-50 last:border-none pb-6">
                                                    <div onClick={() => setExpandedStatId(expandedStatId === s.id ? null : s.id)} className="flex flex-col gap-4 cursor-pointer group">
                                                        <div className="flex justify-between items-end">
                                                            <div className="flex items-center gap-4">
                                                                <div className={`${s.bg} ${s.color} p-3 rounded-2xl transition-all shadow-sm`}><Icon name={s.icon} className="w-6 h-6" /></div>
                                                                <span className="font-black text-slate-800 text-xl tracking-tighter uppercase italic">{s.name}</span>

                                                                <Icon name="ChevronDown" className={`w-5 h-5 text-slate-300 transition-all ${expandedStatId === s.id ? 'rotate-180 text-primary-500' : ''}`} />
                                                            </div>
                                                        </div>
                                                        <div className="h-4 bg-slate-50 rounded-full overflow-hidden relative border border-slate-100 shadow-inner">
                                                            <div className="h-full absolute top-0 left-0 transition-all duration-1000 bg-primary-500 rounded-full" style={{ width: `${s.percentage}%` }}></div>
                                                        </div>
                                                    </div>
                                                    {expandedStatId === s.id && (
                                                        <div className="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-2 animate-[slideUp_0.3s_ease-out]">
                                                            {s.unitBreakdown.map(u => (

                                                                    <span>{u.name}</span>

                                                                        <Icon name="ArrowRight" className="w-3 h-3" />
                                                                    </div>

                                                </div>

                    </main>

                    {isModalOpen && (

                                {statusText && (

                                                <label key={s.id} className="cursor-pointer">
                                                    <input type="radio" name="subjectId" value={s.id} checked={selectedSubjectId === s.id} onChange={(e) => setSelectedSubjectId(e.target.value)} className="peer sr-only" />
                                                    <div className="py-4 border-2 border-slate-50 rounded-2xl peer-checked:border-primary-500 peer-checked:bg-primary-50 dark:peer-checked:bg-primary-500/20 text-[10px] font-black text-slate-400 peer-checked:text-primary-700 dark:peer-checked:text-primary-400 text-center transition-all uppercase italic truncate px-1">{s.name}</div>
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-[11px] font-black text-slate-400 mb-3 uppercase tracking-widest italic">2. Ünite</label>
                                        <select name="unitName" className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-[1.5rem] outline-none font-black text-slate-700 text-xs shadow-inner focus:border-primary-300 transition-all uppercase">
                                            {activeCurriculum.find(s => s.id === selectedSubjectId)?.units.map(u => <option key={u} value={u}>{u}</option>)}
                                        </select>
                                    </div>

                                    <label className="block w-full cursor-pointer group">
                                        <div className={`border-4 border-dashed rounded-[2.5rem] p-4 bg-slate-50 text-center min-h-[160px] flex flex-col items-center justify-center transition-all ${preview ? 'border-primary-500 bg-white' : 'border-slate-100 group-hover:border-primary-300'}`}>
                                            {preview ? (
                                                <img src={preview} className="max-h-[160px] rounded-2xl shadow-xl border-2 border-white object-contain" />
                                            ) : (
                                                <div className="flex flex-col items-center">
                                                    <Icon name="Camera" className="w-12 h-12 text-slate-200 mb-3" />
                                                    <span className="text-[10px] font-black text-slate-300 uppercase tracking-widest italic">FOTOĞRAF ÇEK VEYA YÜKLE</span>
                                                </div>
                                            )}
                                            <input 
                                                type="file" 
                                                ref={fileInputRef}
                                                accept="image/*" 
                                                capture="environment" 
                                                className="hidden" 
                                                onChange={handleFileSelect} 
                                            />
                                        </div>
                                    </label>

                                    <div>
                                        <label className="block text-[11px] font-black text-slate-400 mb-3 uppercase tracking-widest italic">3. Doğru Cevap (Opsiyonel)</label>
                                        <div className="grid grid-cols-4 gap-2">
                                            {['A', 'B', 'C', 'D'].map(opt => (
                                                <label key={opt} className="cursor-pointer">
                                                    <input type="radio" name="correctAnswer" value={opt} className="peer sr-only" />
                                                    <div className="py-4 border-2 border-slate-50 rounded-2xl peer-checked:border-primary-500 peer-checked:bg-primary-50 dark:peer-checked:bg-primary-500/20 text-[14px] font-black text-slate-400 peer-checked:text-primary-700 dark:peer-checked:text-primary-400 text-center transition-all uppercase">{opt}</div>
                                                </label>
                                            ))}
                                        </div>
                                    </div>

                                    <textarea name="note" placeholder="Soruda neyi yanlış yaptın?" className="w-full p-6 bg-slate-50 border-2 border-slate-100 rounded-[2.5rem] h-28 outline-none font-bold text-slate-700 text-sm shadow-inner focus:border-primary-300 transition-all italic" />
                                    
                                    <button disabled={loading} className="w-full btn-primary justify-center py-7 text-2xl tracking-tighter italic uppercase shadow-xl disabled:opacity-50">
                                        {loading ? statusText || "LÜTFEN BEKLEYİN..." : "DEFTRE EKLE"}
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {viewingQuestion && (
                        <div className="fixed inset-0 z-[120] overflow-y-auto bg-black/98 backdrop-blur-xl custom-scrollbar" onClick={() => { if('speechSynthesis' in window) window.speechSynthesis.cancel(); setIsSpeaking(false); setViewingQuestion(null); }}>
                            <div className="flex flex-col items-center p-4 py-12 min-h-full">
                                <div className="max-w-4xl w-full flex flex-col items-center gap-6 animate-[slideUp_0.3s_ease-out]" onClick={e => e.stopPropagation()}>
                                    <img src={viewingQuestion.imageUrl} onClick={(e) => { e.stopPropagation(); setFullScreenImage(viewingQuestion.imageUrl); }} className="w-full h-auto max-h-[60vh] object-contain rounded-[2rem] shadow-2xl border-2 border-white/5 cursor-zoom-in hover:scale-[1.02] transition-transform" />
                                    <div className="glass-card p-6 sm:p-12 w-full max-w-4xl bg-white relative text-center">
                                    <button onClick={() => { if('speechSynthesis' in window) window.speechSynthesis.cancel(); setIsSpeaking(false); setViewingQuestion(null); }} className="absolute top-4 right-4 p-2 text-slate-400 hover:text-slate-700 hover:bg-slate-100 rounded-full transition-all z-10">
                                        <Icon name="X" className="w-6 h-6" />
                                    </button>
                                    <div className="absolute bottom-4 right-4 flex gap-2 z-10">
                                        <button onClick={(e) => { e.stopPropagation(); updateFileInputRef.current.click(); }} className="p-3 text-blue-400 hover:text-white hover:bg-blue-500 rounded-2xl transition-all shadow-sm" title="Fotoğrafı Değiştir">
                                            <Icon name="ImagePlus" className="w-5 h-5" />
                                        </button>
                                        <button onClick={async (e) => { e.stopPropagation(); if(confirm("Silinsin mi?")){ if(viewingQuestion.isCloud) await db.collection('questions').doc(viewingQuestion.id).delete(); else { const upd = localQs.filter(x => x.id !== viewingQuestion.id); localStorage.setItem('hata_v6', JSON.stringify(upd)); setLocalQs(upd); } setViewingQuestion(null); } }} className="p-3 text-red-400 hover:text-white hover:bg-red-500 rounded-2xl transition-all shadow-sm" title="Soruyu Sil">
                                            <Icon name="Trash2" className="w-5 h-5" />
                                        </button>
                                    </div>
                                    <input type="file" accept="image/*" ref={updateFileInputRef} className="hidden" onChange={handleUpdateFileSelect} />
                                    
                                    <div className="absolute -top-5 left-1/2 -translate-x-1/2 flex gap-3 z-20 items-center justify-center w-full">
                                        <div className="flex gap-2 sm:gap-3">
                                            <span className="px-5 sm:px-6 py-2.5 bg-primary-600 text-white rounded-full text-[10px] sm:text-[11px] font-black uppercase shadow-2xl italic tracking-widest whitespace-nowrap">{viewingQuestion.grade}. SINIF</span>
                                            <span className="hidden sm:inline-block px-6 py-2.5 bg-slate-900 text-white rounded-full text-[11px] font-black uppercase shadow-2xl italic tracking-widest whitespace-nowrap">DETAY</span>
                                            
                                            {viewingQuestion.correctAnswer && (
                                                !showAnswer ? (
                                                    <button onClick={(e) => { e.stopPropagation(); setShowAnswer(true); }} className="px-5 sm:px-6 py-2.5 bg-amber-500 hover:bg-amber-600 text-white rounded-full text-[10px] sm:text-[11px] font-black uppercase shadow-2xl italic tracking-widest whitespace-nowrap transition-all flex items-center gap-2">
                                                        <Icon name="Eye" className="w-3 h-3" /> CEVAP
                                                    </button>
                                                ) : (
                                                    <span className="px-5 sm:px-6 py-2.5 bg-emerald-500 text-white rounded-full text-[10px] sm:text-[11px] font-black uppercase shadow-2xl italic tracking-widest whitespace-nowrap flex items-center gap-2 animate-[fadeIn_0.3s_ease-out]">
                                                        CEVAP: {viewingQuestion.correctAnswer}
                                                    </span>
                                                )
                                            )}
                                        </div>
                                    </div>
                                    
                                    {viewingQuestion.note && (
                                        <p className="text-2xl font-bold text-slate-900 leading-relaxed italic tracking-tight mt-6">"{viewingQuestion.note}"</p>
                                    )}

                                    {!viewingQuestion.aiSolution && geminiApiKey && geminiApiKey.trim() !== '' && (
                                        <div className="w-full mt-8 bg-primary-50/50 dark:bg-primary-500/5 p-6 rounded-3xl border border-primary-100 dark:border-primary-500/20 flex flex-col items-center gap-4 transition-all">
                                            <button disabled={isAILoading} onClick={(e) => { e.stopPropagation(); triggerAI(); }} className="btn-primary py-4 px-8 w-full max-w-sm justify-center flex items-center gap-3 shadow-xl">
                                                {isAILoading ? (
                                                    <><div className="w-5 h-5 border-[3px] border-white/30 border-t-white rounded-full animate-spin"></div> ANALİZ EDİLİYOR...</>
                                                ) : (
                                                    <><Icon name="Sparkles" className="w-5 h-5" /> YAPAY ZEKA İLE ÇÖZ</>
                                                )}
                                            </button>
                                        </div>
                                    )}
                                    
                                    {viewingQuestion.aiSolution && (
                                        <div className="w-full mt-8 text-left space-y-4 animate-[fadeIn_0.5s_ease-out] flex flex-col items-center">
                                            {!showAISolution ? (
                                                <button onClick={(e) => { e.stopPropagation(); setShowAISolution(true); }} className="px-8 py-4 bg-emerald-50 dark:bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 font-black rounded-3xl uppercase text-[12px] tracking-widest border-2 border-emerald-100 dark:border-emerald-500/30 hover:bg-emerald-500 hover:text-white transition-all flex items-center gap-2">
                                                    <Icon name="Bot" className="w-4 h-4" /> AI Çözümü Göster
                                                </button>
                                            ) : (
                                                <div className="w-full space-y-4">
                                                    <div className="p-6 bg-slate-50 dark:bg-slate-800 rounded-3xl border border-slate-100 dark:border-slate-700 shadow-sm relative w-full">
                                                        <div className="absolute -top-3 -left-2 bg-emerald-500 text-white px-3 py-1 rounded-lg text-[9px] font-black tracking-widest flex items-center gap-1 shadow-md">
                                                            <Icon name="Bot" className="w-3 h-3" /> AI ÇÖZÜMÜ
                                                        </div>
                                                        <div className="absolute -top-3 -right-2 flex gap-1.5 z-30">
                                                             <button onClick={(e) => { e.stopPropagation(); toggleSpeech(viewingQuestion.aiSolution); }} className={`px-3 py-1 rounded-lg text-[9px] font-black transition-all shadow-md flex items-center gap-1.5 ${isSpeaking ? 'bg-red-500 text-white animate-pulse' : 'bg-primary-600 text-white hover:bg-primary-700'}`}>
                                                                 <Icon name={isSpeaking ? 'Square' : 'Volume2'} className="w-2.5 h-2.5" />
                                                                 {isSpeaking ? 'DURDUR' : 'DİNLE'}
                                                             </button>
                                                             <button onClick={(e) => { e.stopPropagation(); if('speechSynthesis' in window) window.speechSynthesis.cancel(); setIsSpeaking(false); setShowAISolution(false); }} className="bg-slate-200 dark:bg-slate-600 text-slate-500 dark:text-slate-300 px-3 py-1 rounded-lg text-[9px] font-black hover:bg-red-500 hover:text-white transition-all shadow-md">
                                                                 GİZLE
                                                             </button>
                                                         </div>
                                                        <div className="text-base sm:text-lg mt-4 max-h-[50vh] overflow-y-auto pr-3 custom-scrollbar">
                                                            {formatAIText(viewingQuestion.aiSolution)}
                                                        </div>
                                                    </div>
                                                    
                                                    {viewingQuestion.aiTip && (
                                                        <div className="p-5 bg-amber-50 dark:bg-amber-500/10 rounded-2xl border border-amber-200 dark:border-amber-500/20 relative w-full">
                                                            <div className="absolute -top-3 right-4 bg-amber-400 text-amber-900 px-3 py-1 rounded-lg text-[9px] font-black tracking-widest flex items-center gap-1 shadow-sm">
                                                                <Icon name="Lightbulb" className="w-3 h-3" /> TÜYO
                                                            </div>
                                                            <div className="mt-2 text-base sm:text-lg">
                                                                {formatAIText(viewingQuestion.aiTip, 'tip')}
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            )}
                                        </div>
                                    )}

                                </div>
                            </div>
                        </div>
                        </div>
                    )}

                    {fullScreenImage && (
                        <div className="fixed inset-0 z-[130] flex items-center justify-center bg-black/95 backdrop-blur-md cursor-zoom-out animate-[fadeIn_0.2s_ease-out]" onClick={() => setFullScreenImage(null)}>
                            <img src={fullScreenImage} className="w-full h-full object-contain p-4" />
                            <button onClick={(e) => { e.stopPropagation(); setFullScreenImage(null); }} className="absolute top-6 right-6 p-3 bg-white/10 hover:bg-white/20 rounded-full text-white backdrop-blur-md transition-all">
                                <Icon name="X" className="w-8 h-8" />
                            </button>
                        </div>
                    )}

                    {cropImageSrc && (
                        <div className="fixed inset-0 z-[150] flex flex-col items-center justify-center bg-black/98 backdrop-blur-xl p-4 animate-[fadeIn_0.3s_ease-out]">
                            <div className="w-full h-[70vh] max-w-4xl relative bg-black rounded-[2rem] overflow-hidden shadow-2xl mb-8 border border-white/10">
                                <img ref={cropperRef} src={cropImageSrc} style={{ display: 'block', maxWidth: '100%' }} />
                            </div>
                            <div className="flex gap-4">
                                                <button onClick={() => { setCropImageSrc(null); setUpdatingQuestion(null); }} className="px-10 py-5 bg-slate-800 text-slate-300 font-black rounded-3xl uppercase tracking-widest text-[11px] hover:bg-slate-700 transition-all border border-white/10">İPTAL</button>
                                                <button onClick={handleCrop} className="px-14 py-5 bg-primary-600 text-white font-black rounded-3xl uppercase tracking-widest text-[11px] shadow-xl hover:bg-primary-500 transition-all">KIRP ve ONAYLA</button>
                                            </div>
                                        </div>
                                    )}

                                    {showAdminPanel && (
                                        <div className="fixed inset-0 z-[200] flex items-center justify-center bg-black/80 backdrop-blur-md p-4 animate-[fadeIn_0.2s_ease-out]">
                                            <div className="glass-card bg-white dark:bg-slate-900 p-8 w-full max-w-sm text-center relative shadow-2xl">
                                                <button onClick={() => setShowAdminPanel(false)} className="absolute top-4 right-4 p-2 text-slate-400 hover:text-slate-700 dark:hover:text-slate-200">
                                                    <Icon name="X" className="w-6 h-6" />
                                                </button>
                                                <h3 className="text-xl font-black text-slate-800 dark:text-slate-100 uppercase tracking-widest mb-6">Yönetici Paneli</h3>
                                                <div className="space-y-4 text-left">
                                                    <label className="block text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest">Gemini API Anahtarı</label>
                                                    <input type="password" value={geminiApiKey} onChange={e => {
                                                        setGeminiApiKey(e.target.value);
                                                        localStorage.setItem('gemini_api_key', e.target.value);
                                                    }} className="w-full p-4 border-2 border-slate-200 dark:border-slate-700 bg-transparent dark:text-white rounded-xl outline-none focus:border-primary-500 dark:focus:border-primary-500 font-mono text-xs transition-all" placeholder="API Anahtarını Yapıştırın" />
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            );
                        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    <style>@keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } } @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }</style>


</body></html>

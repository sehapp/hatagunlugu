        const CURRICULUM = {

                { id: 'matematik', name: 'Matematik', icon: 'Calculator', color: 'text-indigo-500 dark:text-indigo-400', bg: 'bg-indigo-50 dark:bg-indigo-500/20', units: ['Çarpanlar ve Katlar', 'Üslü İfadeler', 'Kareköklü İfadeler', 'Veri Analizi', 'Olasılık', 'Cebirsel İfadeler', 'Doğrusal Denklemler', 'Eşitsizlikler', 'Üçgenler', 'Eşlik ve Benzerlik', 'Dönüşüm Geometrisi', 'Geometrik Cisimler'] },
                { id: 'fen', name: 'Fen Bilimleri', icon: 'FlaskConical', color: 'text-teal-500 dark:text-teal-400', bg: 'bg-teal-50 dark:bg-teal-500/20', units: ['Mevsimlerin Oluşumu ve İklim', 'DNA ve Genetik Kod', 'Basınç', 'Madde ve Endüstri', 'Basit Makineler', 'Enerji Dönüşümleri', 'Elektrik Yükleri'] },

                { id: 'din', name: 'Din Kültürü', icon: 'Moon', color: 'text-rose-500 dark:text-rose-400', bg: 'bg-rose-50 dark:bg-rose-500/20', units: ['Kader İnancı', 'Zekat ve Sadaka', 'Din ve Hayat', 'Hz. Muhammed’in Örnekliği', 'Kur’an-ı Kerim Özellikleri'] },
                { id: 'ingilizce', name: 'İngilizce', icon: 'Languages', color: 'text-cyan-500 dark:text-cyan-400', bg: 'bg-cyan-50 dark:bg-cyan-500/20', units: ['Friendship', 'Teen Life', 'In The Kitchen', 'On The Phone', 'The Internet', 'Adventures', 'Tourism', 'Chores', 'Science', 'Natural Forces'] }

            '7': [
                { id: 'turkce', name: 'Türkçe', icon: 'BookOpen', color: 'text-emerald-600 dark:text-emerald-400', bg: 'bg-emerald-50 dark:bg-emerald-500/20', units: ['Sözcükte Anlam', 'Cümlede Anlam', 'Parçada Anlam', 'Fiiller (Kip ve Anlam)', 'Zarflar', 'Ek Fiiller', 'Yazım Kuralları', 'Noktalama İşaretleri'] },
                { id: 'matematik', name: 'Matematik', icon: 'Calculator', color: 'text-indigo-500 dark:text-indigo-400', bg: 'bg-indigo-50 dark:bg-indigo-500/20', units: ['Tam Sayılarla İşlemler', 'Rasyonel Sayılar', 'Cebirsel İfadeler', 'Eşitlik ve Denklem', 'Oran ve Orantı', 'Yüzdeler', 'Doğrular ve Açılar', 'Çokgenler'] },
                { id: 'fen', name: 'Fen Bilimleri', icon: 'FlaskConical', color: 'text-teal-500 dark:text-teal-400', bg: 'bg-teal-50 dark:bg-teal-500/20', units: ['Güneş Sistemi ve Ötesi', 'Hücre ve Bölünmeler', 'Kuvvet ve Enerji', 'Saf Madde ve Karışımlar', 'Işığın Madde ile Etkileşimi', 'Canlılarda Üreme, Büyüme ve Gelişme', 'Elektrik Devreleri'] },
                { id: 'sosyal', name: 'Sosyal Bilgiler', icon: 'Globe', color: 'text-orange-500 dark:text-orange-400', bg: 'bg-orange-50 dark:bg-orange-500/20', units: ['Birey ve Toplum', 'Kültür ve Miras', 'İnsanlar Yerler ve Çevreler', 'Bilim Teknoloji ve Toplum', 'Ekonomi ve Sosyal Hayat'] },
                { id: 'din', name: 'Din Kültürü', icon: 'Moon', color: 'text-rose-500 dark:text-rose-400', bg: 'bg-rose-50 dark:bg-rose-500/20', units: ['Melek ve Ahiret İnancı', 'Hac ve Kurban', 'Ahlaki Davranışlar', 'Hz. Muhammed’in Örnekliği'] },
                { id: 'ingilizce', name: 'İngilizce', icon: 'Languages', color: 'text-cyan-500 dark:text-cyan-400', bg: 'bg-cyan-50 dark:bg-cyan-500/20', units: ['Appearance and Personality', 'Biographies', 'Sports', 'Wild Animals', 'Television', 'Celebrations', 'Dreams'] }
            ]
        };

        const firebaseConfig = {
            apiKey: "AIzaSyCLlaENT8FdtQQ50TLWX4yZXMrYq9qQYVI",
            authDomain: "hatadefteri-2b239.firebaseapp.com",
            projectId: "hatadefteri-2b239",
            storageBucket: "hatadefteri-2b239.firebasestorage.app",
            messagingSenderId: "1094679263814",
            appId: "1:1094679263814:web:7d784f081d58c75cb66847"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();
        const googleProvider = new firebase.auth.GoogleAuthProvider();

        const Icon = ({ name, className }) => {
            useEffect(() => { if(window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        // IMAGE COMPRESSION UTILITY
        const compressImage = (file, maxWidth = 1600, quality = 0.8) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height = (maxWidth * height) / width;
                            width = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => {
                            resolve({
                                blob,
                                dataUrl: canvas.toDataURL('image/jpeg', quality)
                            });
                        }, 'image/jpeg', quality);
                    };
                };
            });
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [localQs, setLocalQs] = useState([]);
            const [cloudQs, setCloudQs] = useState([]);
            const [grade, setGrade] = useState(() => localStorage.getItem('grade') || '8');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [viewingQuestion, setViewingQuestion] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [selectedSubjectId, setSelectedSubjectId] = useState('turkce');
            const [dashboardFilterId, setDashboardFilterId] = useState(null);
            const [selectedUnitTag, setSelectedUnitTag] = useState(null);
            const [expandedStatId, setExpandedStatId] = useState(null);
            const [preview, setPreview] = useState(null);
            const [loading, setLoading] = useState(false);
            const [statusText, setStatusText] = useState("");
            const [showAnswer, setShowAnswer] = useState(false);
            const [fullScreenImage, setFullScreenImage] = useState(null);
            const [cropImageSrc, setCropImageSrc] = useState(null);
            const [updatingQuestion, setUpdatingQuestion] = useState(null);
            const [theme, setTheme] = useState(() => localStorage.getItem('theme') || 'light');
            
            const fileInputRef = useRef(null);
            const updateFileInputRef = useRef(null);
            const cropperRef = useRef(null);
            const cropperInstance = useRef(null);

            useEffect(() => {
                const saved = localStorage.getItem('hata_v6');
                if (saved) setLocalQs(JSON.parse(saved));
                auth.onAuthStateChanged(u => setUser(u));
            }, []);

            useEffect(() => {
                localStorage.setItem('theme', theme);
                if (theme === 'dark') document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [theme]);

            useEffect(() => {
                localStorage.setItem('grade', grade);
                setSelectedSubjectId('turkce');
                setDashboardFilterId(null);
                setSelectedUnitTag(null);
            }, [grade]);

            useEffect(() => {
                if (!user) return;
                return db.collection('questions').where('userId', '==', user.uid)
                    .onSnapshot(
                        snap => {
                            const docs = snap.docs.map(d => ({ id: d.id, ...d.data(), isCloud: true }));
                            docs.sort((a, b) => {
                                const timeA = a.createdAt?.seconds || Date.now() / 1000;
                                const timeB = b.createdAt?.seconds || Date.now() / 1000;
                                return timeB - timeA;
                            });
                            setCloudQs(docs);
                        },
                        err => console.error("Snapshot hatası (Büyük ihtimalle Index eksiği veya Kurallar):", err)
                    );
            }, [user]);

            useEffect(() => {
                if (cropImageSrc && cropperRef.current) {
                    cropperInstance.current = new window.Cropper(cropperRef.current, {
                        viewMode: 1,
                        dragMode: 'crop',
                        autoCropArea: 0.9,
                        restore: false,
                        guides: true,
                        center: true,
                        highlight: false,
                        cropBoxMovable: true,
                        cropBoxResizable: true,
                        toggleDragModeOnDblclick: false,
                    });
                }
                return () => {
                    if (cropperInstance.current) {
                        cropperInstance.current.destroy();
                        cropperInstance.current = null;
                    }
                };
            }, [cropImageSrc]);

            const activeCurriculum = CURRICULUM[grade];
            const allQs = useMemo(() => user ? [...localQs, ...cloudQs] : localQs, [user, localQs, cloudQs]);

            const filteredQuestions = useMemo(() => {
                const filtered = allQs.filter(q => {
                    const gMatch = q.grade === grade || !q.grade;
                    const sMatch = !dashboardFilterId || q.subjectId === dashboardFilterId;
                    const uMatch = !selectedUnitTag || q.unitName === selectedUnitTag;
                    return gMatch && sMatch && uMatch;
                });

                return filtered.sort((a, b) => {
                    const wA = a.isUnderstood ? 3 : (a.isImportant ? 2 : 1);
                    const wB = b.isUnderstood ? 3 : (b.isImportant ? 2 : 1);
                    if (wA !== wB) return wA - wB;
                    
                    const tA = a.createdAt?.seconds || 0;
                    const tB = b.createdAt?.seconds || 0;
                    return tB - tA;
                });
            }, [dashboardFilterId, selectedUnitTag, allQs, grade]);

            const stats = useMemo(() => {
                const gradeQs = allQs.filter(q => (q.grade === grade || !q.grade));
                const total = gradeQs.length;
                const subjectStats = activeCurriculum.map(s => {
                    const qInS = gradeQs.filter(q => q.subjectId === s.id);
                    const count = qInS.length;
                    const uData = [...new Set(qInS.map(q => q.unitName).filter(Boolean))].map(uName => ({
                        name: uName,
                        count: qInS.filter(q => q.unitName === uName).length
                    })).sort((a,b) => b.count - a.count);
                    return { ...s, count, unitBreakdown: uData, percentage: total > 0 ? (count / total) * 100 : 0 };
                }).sort((a,b) => b.count - a.count);
                return { total, subjectStats };
            }, [allQs, grade, activeCurriculum]);

            const handleFileSelect = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setLoading(true);
                setStatusText("Görüntü İşleniyor...");
                const compressed = await compressImage(file);
                setCropImageSrc(compressed.dataUrl);
                setLoading(false);
                setStatusText("");
                e.target.value = '';
            };

            const handleUpdateFileSelect = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setUpdatingQuestion(viewingQuestion);
                setLoading(true);
                setStatusText("Görüntü İşleniyor...");
                const compressed = await compressImage(file);
                setCropImageSrc(compressed.dataUrl);
                setLoading(false);
                setStatusText("");
                e.target.value = '';
            };

            const handleCrop = async () => {
                if (cropperInstance.current) {
                    const canvas = cropperInstance.current.getCroppedCanvas({
                        maxWidth: 1600,
                        maxHeight: 1600,
                        fillColor: '#fff',
                    });
                    const newImageUrl = canvas.toDataURL('image/jpeg', 0.85);
                    
                    if (updatingQuestion) {
                        if (viewingQuestion && viewingQuestion.id === updatingQuestion.id) {
                            setViewingQuestion(prev => ({ ...prev, imageUrl: newImageUrl }));
                        }
                        setUpdatingQuestion(null);
                        setCropImageSrc(null);
                        
                        try {
                            if (updatingQuestion.isCloud) {
                                await db.collection('questions').doc(updatingQuestion.id).update({ imageUrl: newImageUrl });
                            } else {
                                const upd = localQs.map(q => q.id === updatingQuestion.id ? { ...q, imageUrl: newImageUrl } : q);
                                localStorage.setItem('hata_v6', JSON.stringify(upd));
                                setLocalQs(upd);
                            }
                        } catch (err) {
                            alert("Fotoğraf güncellenirken hata oluştu: " + err.message);
                        }
                    } else {
                        setPreview(newImageUrl);
                        setCropImageSrc(null);
                    }
                }
            };

            const handleSave = async (e) => {
                e.preventDefault();
                if (!preview) return alert("Lütfen bir fotoğraf çekin veya seçin!");
                setLoading(true);
                setStatusText("Kaydediliyor...");
                
                try {
                    const data = { 
                        grade, 
                        subjectId: e.target.subjectId.value, 
                        unitName: e.target.unitName.value, 
                        correctAnswer: e.target.correctAnswer?.value || null,
                        note: e.target.note.value, 
                        createdAt: { seconds: Math.floor(Date.now()/1000) } 
                    };

                    if (user) {
                        try {
                            setStatusText("Kayıt Oluşturuluyor...");
                            
                            // Doğrudan Base64 olarak Firestore'a kaydediyoruz. Storage limitine takılmıyoruz.
                            const dbTask = db.collection('questions').add({ 
                                ...data, 
                                userId: user.uid, 
                                imageUrl: preview, 
                                createdAt: firebase.firestore.FieldValue.serverTimestamp() 
                            });
                            const timeoutDb = new Promise((_, reject) => setTimeout(() => reject(new Error("Veritabanı bağlantısı zaman aşımına uğradı.")), 10000));
                            await Promise.race([dbTask, timeoutDb]);
                            
                            setIsModalOpen(false); setPreview(null);
                        } catch(err) { 
                            console.error(err);
                            alert("Buluta kaydederken hata oluştu: " + err.message + "\n\nCihaz hafızasına kaydedilmesi deneniyor..."); 
                            saveLocal(data, preview); 
                        }
                    } else { 
                        saveLocal(data, preview); 
                    }
                } catch (error) {
                    console.error("Genel Hata:", error);
                    alert("Beklenmeyen bir hata oluştu: " + error.message);
                } finally {
                    setLoading(false);
                    setStatusText("");
                }
            };

            const saveLocal = (data, dataUrl) => {
                try {
                    const upd = [{ ...data, id: 'L'+Date.now(), imageUrl: dataUrl, isCloud: false }, ...localQs];
                    localStorage.setItem('hata_v6', JSON.stringify(upd));
                    setLocalQs(upd);
                    setIsModalOpen(false); setPreview(null);
                } catch(e) {
                    if (e.name === 'QuotaExceededError' || e.message.includes('quota')) {
                        alert("Cihazınızın yerel hafızası doldu! Uygulama içindeki fotoğraflar çok fazla yer kaplıyor. Lütfen giriş yaparak fotoğrafları buluta yedekleyin veya eski soruları silin.");
                    } else {
                        alert("Yerel hafızaya kaydederken hata: " + e.message);
                    }
                    throw e; // Hata handleSave'e iletilsin ki yükleme ekranı kapansın
                }
            };

            const toggleStatus = async (q, type) => {
                let newImportant = q.isImportant || false;
                let newUnderstood = q.isUnderstood || false;

                if (type === 'important') {
                    newImportant = !q.isImportant;
                    if (newImportant) newUnderstood = false;
                } else if (type === 'understood') {
                    newUnderstood = !q.isUnderstood;
                    if (newUnderstood) newImportant = false;
                }

                if (q.isCloud) {
                    try {
                        await db.collection('questions').doc(q.id).update({ isImportant: newImportant, isUnderstood: newUnderstood });
                    } catch (err) {
                        alert("Güncellenirken hata oluştu: " + err.message);
                    }
                } else {
                    const upd = localQs.map(item => item.id === q.id ? { ...item, isImportant: newImportant, isUnderstood: newUnderstood } : item);
                    localStorage.setItem('hata_v6', JSON.stringify(upd));
                    setLocalQs(upd);
                }
            };

                                    <div key={g} onClick={() => setGrade(g)}
                                        className={`grade-chip ${grade === g ? 'bg-primary-600 border-primary-600 text-white shadow-lg' : 'bg-slate-50 border-slate-100 text-slate-400'}`}>
                                        {g}. Sınıf
                                    </div>
                                ))}
                            </div>
                            <nav className="flex-grow flex justify-center">
                                <div className="flex bg-slate-100 p-1 rounded-2xl border border-slate-100">
                                    <div onClick={() => setActiveTab('dashboard')} className={`nav-link ${activeTab === 'dashboard' ? 'bg-white shadow-md text-primary-700' : 'text-slate-400 hover:text-slate-600'}`}>DEFTER</div>
                                    <div onClick={() => setActiveTab('stats')} className={`nav-link ${activeTab === 'stats' ? 'bg-white shadow-md text-primary-700' : 'text-slate-400 hover:text-slate-600'}`}>ANALİZ</div>
                                </div>
                            </nav>
                            <div className="w-[180px] flex justify-end items-center gap-3">
                                <button onClick={() => setTheme(t => t === 'dark' ? 'light' : 'dark')} className="p-2 text-slate-400 hover:text-primary-600 transition-colors bg-slate-50 rounded-full">
                                    {theme === 'dark' ? <Icon name="Sun" className="w-4 h-4" /> : <Icon name="Moon" className="w-4 h-4" />}
                                </button>
                                {!user ? <button onClick={() => auth.signInWithPopup(googleProvider).catch(err => alert("Giriş yapılamadı: " + err.message))} className="text-[10px] font-black text-slate-400 uppercase tracking-widest hover:text-primary-600 transition-colors">GİRİŞ</button> : <button onClick={() => auth.signOut()} className="text-[10px] font-black text-red-500 uppercase tracking-widest hover:text-red-700 transition-colors">ÇIKIŞ</button>}
                                <button onClick={() => setIsModalOpen(true)} className="btn-primary py-2.5 px-6"><Icon name="Plus" className="w-4 h-4" /> <span className="hidden lg:inline uppercase">SORU EKLE</span></button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto w-full p-4 pt-10 flex-grow">
                        <div className="sm:hidden flex justify-center gap-2 mb-8">
                            {['7', '8'].map(g => (
                                <div key={g} onClick={() => setGrade(g)} className={`grade-chip ${grade === g ? 'bg-primary-600 border-primary-600 text-white' : 'bg-slate-50 border-slate-100 text-slate-400'}`}>{g}. Sınıf</div>
                            ))}
                        </div>

                        {activeTab === 'dashboard' ? (
                            <div className="animate-[fadeIn_0.3s_ease-out]">
                                <div className="grid grid-cols-2 xs:grid-cols-3 md:grid-cols-6 gap-2 mb-10">
                                    {activeCurriculum.map(s => (
                                        <div key={s.id} onClick={() => { setDashboardFilterId(dashboardFilterId === s.id ? null : s.id); setSelectedUnitTag(null); }} 
                                            className={`subject-card ${dashboardFilterId === s.id ? 'ring-4 ring-primary-500/20 bg-primary-50 dark:bg-primary-500/10 border-primary-100 dark:border-primary-500/30' : ''}`}>
                                            <div className={`${s.bg} ${s.color} p-4 rounded-full mb-1`}><Icon name={s.icon} className="w-6 h-6" /></div>
                                            <div className="text-center px-1">
                                                <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest leading-none truncate w-full">{s.name}</p>
                                                <p className="text-3xl font-black text-slate-800 mt-1.5 leading-none">{allQs.filter(q => (q.grade === grade || !q.grade) && q.subjectId === s.id).length}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 pb-20">
                                    {filteredQuestions.map(q => (
                                        <div key={q.id} onClick={() => { setViewingQuestion(q); setShowAnswer(false); }} className="glass-card overflow-hidden group hover:shadow-2xl cursor-pointer transition-all">
                                            <div className="relative aspect-video bg-slate-100 dark:bg-slate-800">
                                                <img src={q.imageUrl} className={`w-full h-full object-cover transition-all ${q.isUnderstood ? 'grayscale opacity-70' : ''}`} loading="lazy" />
                                                <div className="absolute top-3 left-3 flex flex-col gap-1.5 items-start">
                                                    <span className={`px-2.5 py-1 rounded-full text-[9px] font-black uppercase tracking-widest shadow-lg ${activeCurriculum.find(s=>s.id===q.subjectId)?.bg || 'bg-slate-50'} ${activeCurriculum.find(s=>s.id===q.subjectId)?.color || 'text-slate-500'}`}>{activeCurriculum.find(s=>s.id===q.subjectId)?.name || 'Ders'}</span>
                                                    {q.unitName && <span className="px-2.5 py-1 rounded-full text-[8px] font-black uppercase bg-white/90 dark:bg-black/80 text-slate-700 dark:text-slate-200 shadow-md">{q.unitName}</span>}
                                                </div>
                                                <div className="absolute top-3 right-3 flex flex-col gap-2 z-10">
                                                    <button onClick={(e) => { e.stopPropagation(); toggleStatus(q, 'important'); }} className={`p-2 rounded-full backdrop-blur-md shadow-lg transition-all border border-white/20 ${q.isImportant ? 'bg-yellow-400 text-white' : 'bg-white/80 dark:bg-black/50 text-slate-400 hover:text-yellow-500'}`}>
                                                        <Icon name="Star" className={`w-4 h-4 ${q.isImportant ? 'fill-current' : ''}`} />
                                                    </button>
                                                    <button onClick={(e) => { e.stopPropagation(); toggleStatus(q, 'understood'); }} className={`p-2 rounded-full backdrop-blur-md shadow-lg transition-all border border-white/20 ${q.isUnderstood ? 'bg-emerald-500 text-white' : 'bg-white/80 dark:bg-black/50 text-slate-400 hover:text-emerald-500'}`}>
                                                        <Icon name="Check" className="w-4 h-4 stroke-[3]" />
                                                    </button>
                                                </div>
                                            </div>
                                            <div className="p-6">
                                                <p className="text-slate-700 font-bold text-base mb-6 line-clamp-2 h-12 italic leading-relaxed">"{q.note || "İpuçları..."}"</p>
                                                <div className="flex justify-between items-center text-[10px] font-black text-slate-400 tracking-widest uppercase">
                                                    <span>{new Date(q.createdAt?.seconds*1000).toLocaleDateString()}</span>
                                                    <span className="text-primary-600 flex items-center gap-1 font-bold">İNCELE <Icon name="ArrowRight" className="w-3 h-3" /></span>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="animate-[fadeIn_0.3s_ease-out] pb-24 text-center">
                                <div className="mb-14">
                                    <h2 className="text-5xl font-black text-slate-900 tracking-tighter uppercase italic">{grade}. SINIF ANALİZİ</h2>
                                    <p className="text-slate-400 font-bold uppercase text-xs tracking-widest mt-2">Gelişimini verilerle takip et.</p>
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 text-left">
                                    <div className="lg:col-span-1">
                                        <div className="glass-card p-12 bg-primary-600 text-white text-center shadow-2xl">
                                            <h3 className="text-[10px] font-black uppercase tracking-[0.5em] mb-4 opacity-70 italic font-bold">Toplam Hata</h3>
                                            <p className="text-9xl font-black tracking-tighter leading-none">{stats.total}</p>
                                        </div>
                                    </div>
                                    <div className="lg:col-span-2 glass-card p-10 bg-white">
                                        <div className="space-y-6">
                                            {stats.subjectStats.map(s => (
                                                <div key={s.id} className="border-b border-slate-50 last:border-none pb-6">
                                                    <div onClick={() => setExpandedStatId(expandedStatId === s.id ? null : s.id)} className="flex flex-col gap-4 cursor-pointer group">
                                                        <div className="flex justify-between items-end">
                                                            <div className="flex items-center gap-4">
                                                                <div className={`${s.bg} ${s.color} p-3 rounded-2xl transition-all shadow-sm`}><Icon name={s.icon} className="w-6 h-6" /></div>
                                                                <span className="font-black text-slate-800 text-xl tracking-tighter uppercase italic">{s.name}</span>
                                                            </div>
                                                            <div className="flex items-center gap-3">
                                                                <span className="text-xs font-black text-slate-400 uppercase tracking-widest">{s.count} Hata</span>
                                                                <Icon name="ChevronDown" className={`w-5 h-5 text-slate-300 transition-all ${expandedStatId === s.id ? 'rotate-180 text-primary-500' : ''}`} />
                                                            </div>
                                                        </div>
                                                        <div className="h-4 bg-slate-50 rounded-full overflow-hidden relative border border-slate-100 shadow-inner">
                                                            <div className="h-full absolute top-0 left-0 transition-all duration-1000 bg-primary-500 rounded-full" style={{ width: `${s.percentage}%` }}></div>
                                                        </div>
                                                    </div>
                                                    {expandedStatId === s.id && (
                                                        <div className="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-2 animate-[slideUp_0.3s_ease-out]">
                                                            {s.unitBreakdown.map(u => (
                                                                <div key={u.name} onClick={() => jumpToTopic(s.id, u.name)} className="flex justify-between items-center p-3 rounded-xl bg-slate-50 border border-slate-100 text-[10px] font-black text-slate-500 uppercase tracking-widest italic hover:bg-white hover:border-primary-500 hover:text-primary-600 transition-all cursor-pointer">
                                                                    <span>{u.name}</span>
                                                                    <div className="flex items-center gap-3">
                                                                        <span className="bg-primary-50 dark:bg-primary-500/20 px-2.5 py-1 rounded-lg text-primary-600 dark:text-primary-400 font-black">{u.count}</span>
                                                                        <Icon name="ArrowRight" className="w-3 h-3" />
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {isModalOpen && (
                        <div className="fixed inset-0 z-[110] flex items-center justify-center p-4 bg-black/70 backdrop-blur-md">
                            <div className="glass-card w-full max-w-lg max-h-[95vh] overflow-y-auto bg-white p-8 relative animate-[slideUp_0.3s_ease-out]">
                                <button onClick={() => { setIsModalOpen(false); setPreview(null); }} className="absolute top-6 right-6 p-2 text-slate-400 hover:bg-slate-50 rounded-full"><Icon name="X" className="w-8 h-8" /></button>
                                <h3 className="text-3xl font-black text-slate-900 mb-8 tracking-tighter uppercase italic text-center font-sans tracking-tight">SORU KAYDI</h3>
                                
                                {statusText && (
                                    <div className="mb-4 bg-primary-50 dark:bg-primary-500/10 border border-primary-100 dark:border-primary-500/30 p-3 rounded-xl text-center">
                                        <p className="text-[10px] font-black text-primary-600 uppercase tracking-widest animate-pulse">{statusText}</p>
                                    </div>
                                )}

                                <form onSubmit={handleSave} className="space-y-6">
                                    <div>
                                        <label className="block text-[11px] font-black text-slate-400 mb-3 uppercase tracking-widest italic">1. Branş</label>
                                        <div className="grid grid-cols-3 gap-2">
                                            {activeCurriculum.map(s => (
                                                <label key={s.id} className="cursor-pointer">
                                                    <input type="radio" name="subjectId" value={s.id} checked={selectedSubjectId === s.id} onChange={(e) => setSelectedSubjectId(e.target.value)} className="peer sr-only" />
                                                    <div className="py-4 border-2 border-slate-50 rounded-2xl peer-checked:border-primary-500 peer-checked:bg-primary-50 dark:peer-checked:bg-primary-500/20 text-[10px] font-black text-slate-400 peer-checked:text-primary-700 dark:peer-checked:text-primary-400 text-center transition-all uppercase italic truncate px-1">{s.name}</div>
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-[11px] font-black text-slate-400 mb-3 uppercase tracking-widest italic">2. Ünite</label>
                                        <select name="unitName" className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-[1.5rem] outline-none font-black text-slate-700 text-xs shadow-inner focus:border-primary-300 transition-all uppercase">
                                            {activeCurriculum.find(s => s.id === selectedSubjectId)?.units.map(u => <option key={u} value={u}>{u}</option>)}
                                        </select>
                                    </div>

                                    <label className="block w-full cursor-pointer group">
                                        <div className={`border-4 border-dashed rounded-[2.5rem] p-4 bg-slate-50 text-center min-h-[160px] flex flex-col items-center justify-center transition-all ${preview ? 'border-primary-500 bg-white' : 'border-slate-100 group-hover:border-primary-300'}`}>
                                            {preview ? (
                                                <img src={preview} className="max-h-[160px] rounded-2xl shadow-xl border-2 border-white object-contain" />
                                            ) : (
                                                <div className="flex flex-col items-center">
                                                    <Icon name="Camera" className="w-12 h-12 text-slate-200 mb-3" />
                                                    <span className="text-[10px] font-black text-slate-300 uppercase tracking-widest italic">FOTOĞRAF ÇEK VEYA YÜKLE</span>
                                                </div>
                                            )}
                                            <input 
                                                type="file" 
                                                ref={fileInputRef}
                                                accept="image/*" 
                                                capture="environment" 
                                                className="hidden" 
                                                onChange={handleFileSelect} 
                                            />
                                        </div>
                                    </label>

                                    <div>
                                        <label className="block text-[11px] font-black text-slate-400 mb-3 uppercase tracking-widest italic">3. Doğru Cevap (Opsiyonel)</label>
                                        <div className="grid grid-cols-4 gap-2">
                                            {['A', 'B', 'C', 'D'].map(opt => (
                                                <label key={opt} className="cursor-pointer">
                                                    <input type="radio" name="correctAnswer" value={opt} className="peer sr-only" />
                                                    <div className="py-4 border-2 border-slate-50 rounded-2xl peer-checked:border-primary-500 peer-checked:bg-primary-50 dark:peer-checked:bg-primary-500/20 text-[14px] font-black text-slate-400 peer-checked:text-primary-700 dark:peer-checked:text-primary-400 text-center transition-all uppercase">{opt}</div>
                                                </label>
                                            ))}
                                        </div>
                                    </div>

                                    <textarea name="note" placeholder="Soruda neyi yanlış yaptın?" className="w-full p-6 bg-slate-50 border-2 border-slate-100 rounded-[2.5rem] h-28 outline-none font-bold text-slate-700 text-sm shadow-inner focus:border-primary-300 transition-all italic" />
                                    
                                    <button disabled={loading} className="w-full btn-primary justify-center py-7 text-2xl tracking-tighter italic uppercase shadow-xl disabled:opacity-50">
                                        {loading ? statusText || "LÜTFEN BEKLEYİN..." : "DEFTRE EKLE"}
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {viewingQuestion && (
                        <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 bg-black/98 backdrop-blur-xl overflow-y-auto" onClick={() => setViewingQuestion(null)}>
                            <div className="max-w-4xl w-full flex flex-col items-center gap-6 animate-[slideUp_0.3s_ease-out]" onClick={e => e.stopPropagation()}>
                                <img src={viewingQuestion.imageUrl} onClick={(e) => { e.stopPropagation(); setFullScreenImage(viewingQuestion.imageUrl); }} className="w-full h-auto max-h-[75vh] object-contain rounded-[2rem] shadow-2xl border-2 border-white/5 cursor-zoom-in hover:scale-[1.02] transition-transform" />
                                <div className="glass-card p-12 w-full max-w-2xl bg-white relative text-center">
                                    <button onClick={() => setViewingQuestion(null)} className="absolute top-4 right-4 p-2 text-slate-400 hover:text-slate-700 hover:bg-slate-100 rounded-full transition-all z-10">
                                        <Icon name="X" className="w-6 h-6" />
                                    </button>
                                    <div className="absolute bottom-4 right-4 flex gap-2 z-10">
                                        <button onClick={(e) => { e.stopPropagation(); updateFileInputRef.current.click(); }} className="p-3 text-blue-400 hover:text-white hover:bg-blue-500 rounded-2xl transition-all shadow-sm" title="Fotoğrafı Değiştir">
                                            <Icon name="ImagePlus" className="w-5 h-5" />
                                        </button>
                                        <button onClick={async (e) => { e.stopPropagation(); if(confirm("Silinsin mi?")){ if(viewingQuestion.isCloud) await db.collection('questions').doc(viewingQuestion.id).delete(); else { const upd = localQs.filter(x => x.id !== viewingQuestion.id); localStorage.setItem('hata_v6', JSON.stringify(upd)); setLocalQs(upd); } setViewingQuestion(null); } }} className="p-3 text-red-400 hover:text-white hover:bg-red-500 rounded-2xl transition-all shadow-sm" title="Soruyu Sil">
                                            <Icon name="Trash2" className="w-5 h-5" />
                                        </button>
                                    </div>
                                    <input type="file" accept="image/*" ref={updateFileInputRef} className="hidden" onChange={handleUpdateFileSelect} />
                                    
                                    <div className="absolute -top-5 left-1/2 -translate-x-1/2 flex gap-3">
                                        <span className="px-8 py-2.5 bg-primary-600 text-white rounded-full text-[11px] font-black uppercase shadow-2xl italic tracking-widest">{viewingQuestion.grade}. SINIF</span>
                                        <span className="px-8 py-2.5 bg-slate-900 text-white rounded-full text-[11px] font-black uppercase shadow-2xl italic tracking-widest">DETAY</span>
                                    </div>
                                    <p className="text-2xl font-bold text-slate-900 leading-relaxed italic tracking-tight mt-4">"{viewingQuestion.note || "İpuçları buraya..."}"</p>
                                    
                                    {viewingQuestion.correctAnswer && (
                                        <div className="mt-8 flex justify-center">
                                            {!showAnswer ? (
                                                <button onClick={(e) => { e.stopPropagation(); setShowAnswer(true); }} className="px-8 py-4 bg-primary-50 dark:bg-primary-500/10 text-primary-600 dark:text-primary-400 font-black rounded-3xl uppercase text-[12px] tracking-widest border-2 border-primary-100 dark:border-primary-500/30 hover:bg-primary-500 hover:text-white transition-all">Cevabı Göster</button>
                                            ) : (
                                                <div className="px-10 py-5 bg-primary-600 text-white font-black rounded-3xl uppercase text-2xl shadow-xl flex flex-col items-center gap-1 animate-[fadeIn_0.3s_ease-out]">
                                                    <span className="text-[10px] tracking-widest opacity-80">DOĞRU CEVAP</span>
                                                    <span>{viewingQuestion.correctAnswer}</span>
                                                </div>
                                            )}
                                        </div>
                                    )}

                                </div>
                            </div>
                        </div>
                    )}

                    {fullScreenImage && (
                        <div className="fixed inset-0 z-[130] flex items-center justify-center bg-black/95 backdrop-blur-md cursor-zoom-out animate-[fadeIn_0.2s_ease-out]" onClick={() => setFullScreenImage(null)}>
                            <img src={fullScreenImage} className="w-full h-full object-contain p-4" />
                            <button onClick={(e) => { e.stopPropagation(); setFullScreenImage(null); }} className="absolute top-6 right-6 p-3 bg-white/10 hover:bg-white/20 rounded-full text-white backdrop-blur-md transition-all">
                                <Icon name="X" className="w-8 h-8" />
                            </button>
                        </div>
                    )}

                    {cropImageSrc && (
                        <div className="fixed inset-0 z-[150] flex flex-col items-center justify-center bg-black/98 backdrop-blur-xl p-4 animate-[fadeIn_0.3s_ease-out]">
                            <div className="w-full h-[70vh] max-w-4xl relative bg-black rounded-[2rem] overflow-hidden shadow-2xl mb-8 border border-white/10">
                                <img ref={cropperRef} src={cropImageSrc} style={{ display: 'block', maxWidth: '100%' }} />
                            </div>
                            <div className="flex gap-4">
                                <button onClick={() => { setCropImageSrc(null); setUpdatingQuestion(null); }} className="px-10 py-5 bg-slate-800 text-slate-300 font-black rounded-3xl uppercase tracking-widest text-[11px] hover:bg-slate-700 transition-all border border-white/10">İPTAL</button>
                                <button onClick={handleCrop} className="px-14 py-5 bg-primary-600 text-white font-black rounded-3xl uppercase tracking-widest text-[11px] shadow-xl hover:bg-primary-500 transition-all">KIRP ve ONAYLA</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    <style>@keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } } @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }</style>
</body>
</html>
